      sourceHandle: source
      target: end_analyze
      targetHandle: target
      type: custom
      data:
        isInIteration: false
        isInLoop: false
        sourceType: llm
        targetType: end
    - id: e5
      source: ifelse_node
      sourceHandle: branch_generate
      target: doc_extractor_generate
      targetHandle: target
      type: custom
      data:
        isInIteration: false
        isInLoop: false
        sourceType: if-else
        targetType: document-extractor
    - id: e5_1
      source: doc_extractor_generate
      sourceHandle: source
      target: llm_generate
      targetHandle: target
      type: custom
      data:
        isInIteration: false
        isInLoop: false
        sourceType: document-extractor
        targetType: llm
    - id: e6
      source: llm_generate
      sourceHandle: source
      target: code_generate
      targetHandle: target
      type: custom
      data:
        isInIteration: false
        isInLoop: false
        sourceType: llm
        targetType: code
    - id: e7
      source: code_generate
      sourceHandle: source
      target: end_generate
      targetHandle: target
      type: custom
      data:
        isInIteration: false
        isInLoop: false
        sourceType: code
