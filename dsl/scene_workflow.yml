    - id: e8
      source: ifelse_node
      sourceHandle: branch_confirm
      target: code_confirm
      targetHandle: target
      type: custom
      data:
        isInIteration: false
        isInLoop: false
        sourceType: if-else
        targetType: code
    - id: e9
      source: code_confirm
      sourceHandle: source
      target: end_confirm
      targetHandle: target
      type: custom
      data:
        isInIteration: false
        isInLoop: false
        sourceType: code
